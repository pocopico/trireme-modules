name: Tar modules

on:
  release:
    types: [published]
  workflow_dispatch:

# Add this block here
permissions:
  contents: write

jobs:
  tar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4 for Node 24 support

      - name: Tar modules
        run: |
          for D in $(ls -d *-*); do
            if [ -d "$D" ]; then
              (cd "${D}" && tar caf "../${D}.tgz" *.ko && sha256sum "../${D}.tgz" >> ../chksum.log)
            fi
          done
          if [ -d "firmware" ]; then
            (cd firmware && tar caf ../firmware.tgz *)
          fi

      - name: Release
        uses: softprops/action-gh-release@v2 # Updated to v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.tgz
            chksum.log
